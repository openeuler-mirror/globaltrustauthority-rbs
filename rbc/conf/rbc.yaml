rbs:
  base_url: "https://rbs.example.com"
  timeout_secs: 30
  ca_cert: /path/to/ca.crt

evidence_provider:
  - type: native
    enabled: false
    config_path: /etc/gta/agent_config.yaml

token_provider:
  - type: rbs
    enabled: false
    config_path: /etc/gta/agent_config.yaml

  - type: native
    enabled: false
    config_path: /etc/gta/agent_config.yaml