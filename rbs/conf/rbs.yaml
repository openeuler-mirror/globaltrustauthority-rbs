# RBS Configuration File
# Global Trust Authority (GTA) Resource Broker Service — runtime configuration
# Override path via -c/--config or env RBS_CONFIG

# REST server (required when rest feature is enabled)
rest:
  listen_addr: "127.0.0.1:6666"   # localhost only; use "0.0.0.0:6666" to listen on all interfaces
  workers: 4
  body_limit_bytes: 10485760   # 10 MiB; max request body size (413 if exceeded)
  listen_backlog: 128           # TCP accept queue size
  request_timeout_secs: 60      # max time to read request and send response; 0 = no limit
  shutdown_timeout_secs: 30    # graceful shutdown: wait for in-flight requests before exit
  # When enabled: true, cert_file and key_file must be non-empty and point to valid PEM files.
  https:
    enabled: false
    cert_file: ""
    key_file: ""
  # Per-IP rate limit (token bucket). Effective only when built with --features per-ip-rate-limit.
  rate_limit:
    enabled: false
    requests_per_sec: 60   # max requests per second per client IP
    burst: null            # bucket capacity; default = requests_per_sec when null or omitted
  # When RBS is behind a trusted proxy, list its peer IPs here. Client IP for rate limit and audit
  # is then taken from Forwarded / X-Forwarded-For; otherwise the direct peer is used (no spoofing).
  trusted_proxy:
    addrs: []   # e.g. ["127.0.0.1", "::1"] for a local reverse proxy

# Bearer auth (JWT). Default admin: name and public key (PEM); JWT verified by this key. Role is always admin.
# New admins: registered via Admin API (POST /rbs/v0/admin/users); their public_key/jwks_uri stored in user data.

# Authentication configuration
auth:
  # Bearer JWT verification
  bearer_token:
    # jwks_url and public_key_path are mutually exclusive (only one is required)
    # jwks_url: "https://auth.example.com/.well-known/jwks.json"
    public_key_path: "/etc/rbs/bearer_pub.pem"
    issuer: "https://auth.example.com"
  # AttestToken verification
  attest_token:
    public_key_path: "/etc/rbs/attest_pub.pem"
    issuer: "Global Trust Authority"

# Logging (default: file + rotation for RPM install; set file_path to empty or remove to use stderr only)
logging:
  level: info                    # trace | debug | info | warn | error | off
  format: text                   # text | json
  file_path: /var/log/rbs/rbs.log
  enable_rotation: true
  rotation:
    max_file_size_bytes: 10485760   # bytes before roll
    max_files: 6
    compression: gzip              # none | gzip
    file_mode: 440                 # rotated file permission. Unix only
  file_mode: 640

# Attestation service (GTA and other backends). Timeout per backend under rest.*.
attestation:
  default_as_provider: gta
  backends:
    gta:
      mode: rest
      rest:
        base_url: "https://127.0.0.1:8080"
        timeout_secs: 30
        retries: 3
        tls_verify: true
        ca_file: ""   # custom CA bundle path; empty = use system default
        credentials:
          user_id: "rbs-service"   # required
          main_api_key: "${MAIN_API_KEY}"   # optional (reserved for future use)
          sub_api_key: "${SUB_API_KEY}"   # optional

# # Storage: users, resource policies, and default resource persistence.
# #
# # type: sqlite | memory | mysql | postgres
# # - sqlite  — File-backed SQLite (default). Use sqlite.path (absolute path recommended in production).
# # - memory  — SQLite in-memory only; sqlx connects with sqlite::memory: (ephemeral; dev/test).
# # - mysql   — MySQL / MariaDB via URL; use mysql.url, pool and optional timeout_secs.
# # - postgres — PostgreSQL via URL; use postgres.url, pool and optional timeout_secs.
# #
# # Network backends (mysql, postgres): timeout_secs applies to connect/query where the pool supports it.
# # Omitted optional blocks are ignored; only the block matching `type` is read at runtime.
# storage:
#   type: sqlite
#   sqlite:
#     path: "/var/lib/rbs/rbs.db"

# # --- Examples (uncomment one; keep a single active `storage:` root in real files) ---
# #
# # In-memory SQLite (sqlx ::memory:), no persistence:
# # storage:
# #   type: memory
# #   memory: {}
# #
# # PostgreSQL:
# # storage:
# #   type: postgres
# #   postgres:
# #     url: "${DATABASE_URL}"
# #     max_connections: 10
# #     timeout_secs: 10
# #
# Database configuration
storage:
  db_type: sqlite
  # #  max_connections secs
  max_connections: 10
  # #  timeout secs
  timeout: 30
  # # url: "mysql://user:pass@host:3306/rbs"
  url: "sqlite:///root/rbs.db"
  sql_file_path: "rbs/rdb_sql/sqlite_rbs.sql"

# # Resource backends (for multiple backends; omit when using single storage)
# # Reserved names for res_provider: admin, attestation, resource
# resource:
#   default_provider: local
#   backends:
