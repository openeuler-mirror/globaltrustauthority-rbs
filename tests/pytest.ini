[pytest]
# RBS e2e uses fixed ports; run serially (no pytest-xdist). See tests/README.md.
testpaths = e2e
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -ra
markers =
    e2e: Black-box end-to-end tests (HTTP/process level)
    rbs: RBS server e2e suite
    rbc: RBC client e2e suite
    tools: Workspace tools e2e suite
